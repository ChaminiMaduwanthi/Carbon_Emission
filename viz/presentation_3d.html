 getColor:d=>d.hwy=='motorway'?[215,25,28]:d.hwy=='trunk'?[240,124,0]:[90,150,220],
 widthMinPixels:1.2,opacity:.9});
const arc=new deck.ArcLayer({id:'arc',data:D.arcs,getSourcePosition:d=>d.src,getTargetPosition:d=>d.tgt,

// gentle auto-orbit that PAUSES for 3s after any user drag/zoom, and only rotates
